version: 2

input:
  adapter: nirspec
  path: /path/to/nirspec_g235h_s3d.fits
  redshift: 0.01
  x_range: [20, 23]
  y_range: [20, 23]

fit:
  frame: rest
  wavelength_medium: vacuum
  window: [19200.0, 20050.0]
  exclude_windows: [[19545.0, 19605.0]]
  minimum_valid_pixels: 100
  continuum:
    degree: 1
    windows: [[19200.0, 19400.0], [19800.0, 20050.0]]
  noise: {model: ar1, rho: auto, marginal_scale: auto}
  kinematics:
    max_components: 3
    velocity_kms: [-1000.0, 1000.0]
    sigma_kms: [30.0, 1000.0]
  lines:
    - {name: sivi_1963, wavelength: 19634.1}
  lsf: {model: instrument}
  selection:
    delta_logz: 5.0
    audit: {mode: flag}
  sampling: {min_num_live_points: 200, min_ess: 400, dlogz: 0.5}

output:
  directory: ./nirspec_g235h_output
  resume: true
  plots: selected
  workers: 2
