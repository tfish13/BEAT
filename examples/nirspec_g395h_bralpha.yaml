version: 2

input:
  adapter: nirspec
  path: /path/to/nirspec_g395h_s3d.fits
  redshift: 0.01
  x_range: [20, 23]
  y_range: [20, 23]

fit:
  frame: rest
  wavelength_medium: vacuum
  window: [39700.0, 41350.0]
  minimum_valid_pixels: 100
  continuum:
    degree: 1
    windows: [[39700.0, 40000.0], [41000.0, 41350.0]]
  noise: {model: ar1, rho: auto, marginal_scale: auto}
  kinematics:
    max_components: 3
    velocity_kms: [-1000.0, 1000.0]
    sigma_kms: [30.0, 1000.0]
  lines:
    - {name: bralpha, wavelength: 40522.7}
  lsf: {model: instrument}
  selection:
    delta_logz: 5.0
    audit: {mode: flag}
  sampling: {min_num_live_points: 200, min_ess: 400, dlogz: 0.5}

output:
  directory: ./nirspec_g395h_output
  resume: true
  plots: selected
  workers: 2
